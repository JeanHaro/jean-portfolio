<section class="contact">

  <div class="contact__header">
    <span class="contact__tag">// contacto</span>
    <h2 class="contact__title">
      Hablemos de tu <span class="contact__title--accent">próximo proyecto</span>
    </h2>
  </div>

  <div class="contact__layout">

    <!-- Columna izquierda: enlaces directos -->
    <div class="contact__links">

      <button class="contact__card contact__card--button" (click)="copyEmail()" #cardEl>
        <div class="contact__card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <div class="contact__card-info">
          <span class="contact__card-label">Email</span>
          <span class="contact__card-value">{{ email_contact }}</span>
        </div>
        <span class="contact__card-action">
          {{ copied() ? '¡Copiado!' : 'Copiar' }}
        </span>
      </button>

      <a class="contact__card" href="https://wa.me/{{ whatsapp }}" target="_blank" rel="noopener" #cardEl>
        <div class="contact__card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M17.6 6.32A8.86 8.86 0 0 0 12.05 4c-4.92 0-8.93 4-8.93 8.93 0 1.58.41 3.11 1.2 4.46L3 21l3.72-1.27a8.93 8.93 0 0 0 4.33 1.13h0c4.92 0 8.93-4 8.93-8.93a8.86 8.86 0 0 0-2.38-5.6z"/>
          </svg>
        </div>
        <div class="contact__card-info">
          <span class="contact__card-label">WhatsApp</span>
          <span class="contact__card-value">+51 951 557 808</span>
        </div>
      </a>

      <a class="contact__card" [href]="linkedin" target="_blank" rel="noopener" #cardEl>
        <div class="contact__card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19 0h-14c-2.76 0-5 2.24-5 5v14c0 2.76 2.24 5 5 5h14c2.76 0 5-2.24 5-5v-14c0-2.76-2.24-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.27c-.97 0-1.75-.79-1.75-1.76s.78-1.76 1.75-1.76 1.75.79 1.75 1.76-.78 1.76-1.75 1.76zm13.5 12.27h-3v-5.6c0-1.34-.03-3.07-1.87-3.07-1.87 0-2.16 1.46-2.16 2.97v5.7h-3v-11h2.88v1.5h.04c.4-.76 1.38-1.56 2.84-1.56 3.04 0 3.6 2 3.6 4.6v6.46z"/>
          </svg>
        </div>
        <div class="contact__card-info">
          <span class="contact__card-label">LinkedIn</span>
          <span class="contact__card-value">jean-carlos-haro</span>
        </div>
      </a>

      <a class="contact__card" [href]="github" target="_blank" rel="noopener" #cardEl>
        <div class="contact__card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
        </div>
        <div class="contact__card-info">
          <span class="contact__card-label">GitHub</span>
          <span class="contact__card-value">JeanHaro</span>
        </div>
      </a>

    </div>

    <!-- Columna derecha: formulario -->
    <form class="contact__form" #cardEl (submit)="$event.preventDefault(); submitForm()">

      <div class="contact__field">
        <label for="name">Nombre</label>
        <input
          id="name"
          type="text"
          placeholder="Tu nombre"
          [value]="name()"
          (input)="name.set($any($event.target).value)"
          required
        />
      </div>

      <div class="contact__field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          placeholder="tu@email.com"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          required
        />
      </div>

      <div class="contact__field">
        <label for="message">Mensaje</label>
        <textarea
          id="message"
          rows="4"
          placeholder="Cuéntame sobre tu proyecto..."
          [value]="message()"
          (input)="message.set($any($event.target).value)"
          required
        ></textarea>
      </div>

      <button
        type="submit"
        class="contact__submit"
        [disabled]="formState() === 'sending'"
      >
        @switch (formState()) {
          @case ('sending') { Enviando... }
          @case ('sent')    { ¡Mensaje enviado! ✓ }
          @case ('error')   { Error — intenta de nuevo }
          @default          { Enviar mensaje }
        }
      </button>

    </form>

  </div>

</section>
