<div class="loader" #overlay>
  <div class="loader__content">

    <div class="loader__scene">
      <!-- Pista con líneas que se desplazan -->
      <div class="loader__road"></div>

      <!-- Carro visto desde arriba -->
      <svg class="loader__car" #carIcon width="52" height="80" viewBox="0 0 52 80" fill="none" aria-hidden="true">
        <!-- Carrocería -->
        <rect x="10" y="6" width="32" height="60" rx="14" fill="#c0392b"/>
        <rect x="10" y="6" width="32" height="60" rx="14" fill="#e74c3c" opacity="0.5"/>
        <!-- Parabrisas delantero -->
        <rect x="15" y="12" width="22" height="14" rx="4" fill="#2b2620" opacity="0.7"/>
        <!-- Luna trasera -->
        <rect x="15" y="48" width="22" height="12" rx="4" fill="#2b2620" opacity="0.5"/>
        <!-- Línea central -->
        <rect x="24" y="26" width="4" height="22" rx="2" fill="#ffffff" opacity="0.3"/>
        <!-- Ruedas -->
        <rect x="4"  y="14" width="6" height="14" rx="2" fill="#2b2620"/>
        <rect x="42" y="14" width="6" height="14" rx="2" fill="#2b2620"/>
        <rect x="4"  y="50" width="6" height="14" rx="2" fill="#2b2620"/>
        <rect x="42" y="50" width="6" height="14" rx="2" fill="#2b2620"/>
      </svg>
    </div>

    <h2 class="loader__title">Preparando el taller...</h2>
    <div class="loader__track">
      <div class="loader__bar" #bar></div>
    </div>
    <span class="loader__percent">{{ loading.progress() }}%</span>
  </div>
</div>
